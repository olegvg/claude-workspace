# ============================================
# Prefix
# ============================================
# C-a instead of C-b (GNU Screen style)
set-option -g prefix C-a
bind-key C-a last-window

# Send C-a to nested tmux sessions
bind-key a send-prefix

# ============================================
# General
# ============================================
# Create new session if none exists on attach
new-session

# No delay for escape key press
set -sg escape-time 0

# History buffer
set-option -g history-limit 50000

# Mouse support
setw -g mouse on

# Window titles
set -g set-titles on
set -g set-titles-string "#T"
set-window-option -g automatic-rename on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# ============================================
# True Color (iTerm2)
# ============================================
set-option -g default-command fish
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"

# ============================================
# Navigation
# ============================================
# Space for next window
bind-key Space next-window

# Vi-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resizing with Shift+arrow
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Vi copy mode
setw -g mode-keys vi

# ============================================
# Splits
# ============================================
# Intuitive split keys
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# ============================================
# Reload
# ============================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ============================================
# Status Bar
# ============================================
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour25,fg=colour255,bold"
set -g status-right " %H:%M "
set -g status-right-style "bg=colour235,fg=colour248"

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=red,fg=colour255,bold"
setw -g window-status-style "bg=colour235,fg=colour248"

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour25"

# ============================================
# Window Presets (C-a w)
# ============================================
# Popup menu to create a new window with a preset layout
bind-key w display-menu -T "New Window" \
    "Code  (Claude + Yazi)" c "new-window -n code -c '#{pane_current_path}' ; send-keys 'ws --code' C-m" \
    "YOLO  (Docker + Yazi)" y "new-window -n yolo -c '#{pane_current_path}' ; send-keys 'ws --docker' C-m" \
    "Files (Midnight Commander)" m "new-window -n files -c '#{pane_current_path}' ; send-keys 'mc' C-m" \
    "Shell" s "new-window -n shell -c '#{pane_current_path}'"
